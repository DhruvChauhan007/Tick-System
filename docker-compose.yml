version: "3.9"

services:

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: tick_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  django:
    build: .
    command: sh -c "python wait_db.py && python manage.py makemigrations &&
             python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

    ports:
      - "8000:8000"

    depends_on:
      - mysql
      - redis

    volumes:
      - .:/app

  celery:
    build: .
    command: celery -A tick_system worker -Q ticks --concurrency=10 --pool=gevent --loglevel=info

    depends_on:
      - redis
      - mysql

    volumes:
      - .:/app